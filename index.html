<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jajan Kripto - Solusi Praktis Aset Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-orange: #FF9900;
            --dark-charcoal: #2C2C2C;
            --light-bg: #F9F9F9;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: var(--dark-charcoal);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 40px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid var(--primary-orange);
        }

        .logo {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .logo span {
            color: var(--primary-orange);
        }

        .brackets {
            color: var(--dark-charcoal);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }

        .btn-telegram {
            display: inline-block;
            background-color: var(--primary-orange);
            color: var(--white);
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            transition: transform 0.3s ease, background-color 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
        }

        .btn-telegram:hover {
            background-color: #e68a00;
            transform: translateY(-3px);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #AAA;
        }

        .legal-badge {
            margin-top: 15px;
            display: inline-block;
            padding: 5px 12px;
            background: #EEE;
            border-radius: 4px;
            font-size: 11px;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <span class="brackets">[</span> <span>Jajan Kripto</span> <span class="brackets">]</span>
        </div>
        
        <h1>Beli Aset Digital, Segampang Jajan!</h1>
        <p>Platform retail online otomatis via Telegram Bot yang aman, cepat, dan terpercaya.</p>

        <a href="https://t.me/JajanKriptoOfficial_bot" class="btn-telegram">
            🚀 Mulai Jajan Sekarang
        </a>

        <div class="footer">
            <div class="legal-badge">Terdaftar di OSS (NIB) & PSE Komdigi</div>
            <p>&copy; 2026 Jajan Kripto. All Rights Reserved.</p>
        </div>
    </div>

</body>
</html>
